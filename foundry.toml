[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"

# Optimization settings
optimizer = true
optimizer_runs = 200

# Test settings
[profile.test]
solc = "0.8.24"

# RPC endpoints
[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
base = "https://mainnet.base.org"
ethereum = "https://eth.llamarpc.com"
sepolia = "https://sepolia.drpc.org"

# Chain IDs
[networks]
base_sepolia = { chain-id = 84532, gas-price = 10_000_000 }
base = { chain-id = 8453 }
ethereum = { chain-id = 1 }
sepolia = { chain-id = 11155111 }